spring.application.name=comanda-digital

# Banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/comanda_digital?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password= root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Porta do servidor
server.port=8080

# CORS
spring.web.cors.allowed-origins=http://localhost:4200
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
spring.webservices.path=/ws
springdoc.packagesToScan=com.unasp.comanda_digital.controller
springdoc.pathsToMatch=/api/**